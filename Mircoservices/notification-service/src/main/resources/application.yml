server:
    port: 8082

spring:
    application:
        name: notification-service

    mail:
        host: smtp.gmail.com
        port: 587
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}

        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
    mongodb:
        uri: ${MONGODB_URI}

management:
    endpoints:
        web:
            exposure:
                include: health
